{% extends 'base.html' %}

{% block title %}Удалить категорию{% endblock %}

{% block content %}
<div class="card narrow">
    <h2>Удалить категорию "{{ category.name }}"?</h2>
    <p>Удаление разрешено только для категорий без номинаций.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'voting_app:category_list' %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
