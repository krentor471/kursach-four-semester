{% extends 'base.html' %}

{% block title %}Удалить номинацию{% endblock %}

{% block content %}
<div class="card narrow">
    <h2>Удалить номинацию "{{ nomination.title }}"?</h2>
    <p>Удаление разрешено только для номинаций без голосов.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'voting_app:category_detail' nomination.category.pk %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
