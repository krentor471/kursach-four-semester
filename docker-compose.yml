services:
  web:
    build: .
    command: gunicorn voting.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - redis
      - mailhog

  celery:
    build: .
    command: celery -A voting worker -l info
    env_file:
      - .env.example
    depends_on:
      - redis
      - mailhog

  celery-beat:
    build: .
    command: celery -A voting beat -l info
    env_file:
      - .env.example
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"
